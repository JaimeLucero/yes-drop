# A string used to distinguish different Supabase projects on the same host.
project_id = "yes-drop"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_in = false

[storage]
enabled = true
file_size_limit = "50MiB"

[functions]
[functions.send-scheduled-requests]
verify_jwt = false

[functions.check-deadlines-followups]
verify_jwt = false

# Note: Cron schedules must be configured in Supabase Dashboard
# Go to: https://supabase.com/dashboard/project/aurhheqwpfpngqmhegvx/functions
# For each function, set up cron schedule:
# - send-scheduled-requests: */5 * * * * (every 5 minutes)
# - check-deadlines-followups: 0 * * * * (every hour)
