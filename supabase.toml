# A string used to distinguish different Supabase projects on the same host.
project_id = "yes-drop"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_in = false

[storage]
enabled = true
file_size_limit = "50MiB"

[functions]
[functions.send-scheduled-requests]
verify_jwt = false
# Schedule this edge function to run every 5 minutes (UTC)
schedule = { cron = "*/5 * * * *", timezone = "UTC" }

[functions.check-deadlines-followups]
verify_jwt = false
# Schedule this edge function to run every 5 minutes (UTC)
schedule = { cron = "*/5 * * * *", timezone = "UTC" }

# Note: Supabase applies schedules either from the Dashboard or via the Supabase CLI.
# These schedule keys are added here for repository documentation and for tools that
# sync configuration. Supabase itself uses UTC for function invocations; specifying
# timezone = "UTC" ensures clarity.
